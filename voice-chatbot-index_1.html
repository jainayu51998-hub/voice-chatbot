<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Voice Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .phone {
      width: 360px;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.13);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .phone-header { background: #1a73e8; padding: 18px 18px 14px; }
    .phone-header-top { display: flex; align-items: center; gap: 12px; }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .header-info { flex: 1; }
    .header-title { font-size: 16px; font-weight: 600; color: #fff; }
    .header-sub { font-size: 12px; color: rgba(255,255,255,0.75); margin-top: 2px; }
    .online-dot { width: 9px; height: 9px; border-radius: 50%; background: #34a853; border: 2px solid #1a73e8; }
    .chat-area {
      flex: 1; padding: 14px 12px;
      display: flex; flex-direction: column; gap: 8px;
      overflow-y: auto; height: 340px; background: #f8f9fa;
    }
    .msg { max-width: 82%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; word-break: break-word; }
    .msg.bot { background: #fff; color: #202124; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; align-self: flex-start; }
    .msg.user { background: #1a73e8; color: #fff; border-bottom-right-radius: 4px; align-self: flex-end; }
    .msg.typing { color: #888; font-style: italic; }
    .status-bar { text-align: center; font-size: 12px; color: #5f6368; padding: 5px 0; min-height: 22px; background: #f8f9fa; }
    .chip-row { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px; background: #f8f9fa; border-top: 1px solid #eee; }
    .chip { font-size: 12px; padding: 5px 12px; border-radius: 16px; border: 1px solid #dadce0; color: #1a73e8; cursor: pointer; background: #fff; transition: background 0.15s; }
    .chip:hover { background: #e8f0fe; border-color: #1a73e8; }
    .input-row { display: flex; gap: 8px; padding: 12px 14px; border-top: 1px solid #e0e0e0; background: #fff; align-items: center; }
    .chat-input { flex: 1; border: 1px solid #dadce0; border-radius: 24px; padding: 9px 16px; font-size: 14px; outline: none; background: #f8f9fa; color: #202124; transition: border-color 0.2s; }
    .chat-input:focus { border-color: #1a73e8; background: #fff; }
    .btn-send { width: 38px; height: 38px; border-radius: 50%; background: #1a73e8; border: none; color: #fff; cursor: pointer; font-size: 16px; flex-shrink: 0; transition: background 0.15s; }
    .btn-send:hover { background: #1558b0; }
    .btn-mic { width: 38px; height: 38px; border-radius: 50%; background: #f8f9fa; border: 1px solid #dadce0; color: #5f6368; cursor: pointer; font-size: 17px; flex-shrink: 0; transition: all 0.15s; }
    .btn-mic:hover { border-color: #1a73e8; color: #1a73e8; }
    .btn-mic.listening { background: #ea4335; border-color: #ea4335; color: #fff; animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
    .footer { margin-top: 16px; font-size: 12px; color: #888; text-align: center; }
    .footer a { color: #1a73e8; text-decoration: none; }
  </style>
</head>
<body>

  <div class="phone">
    <div class="phone-header">
      <div class="phone-header-top">
        <div class="avatar">🤖</div>
        <div class="header-info">
          <div class="header-title">AI Voice Chatbot</div>
          <div class="header-sub">Powered by Web Speech API</div>
        </div>
        <div class="online-dot"></div>
      </div>
    </div>

    <div class="chat-area" id="chatArea"></div>
    <div class="status-bar" id="statusBar"></div>

    <div class="chip-row">
      <div class="chip" onclick="quickSend('Hello!')">Hello!</div>
      <div class="chip" onclick="quickSend('What services do you offer?')">Services</div>
      <div class="chip" onclick="quickSend('What is the pricing?')">Pricing</div>
      <div class="chip" onclick="quickSend('Tell me about Dialogflow')">Dialogflow</div>
      <div class="chip" onclick="quickSend('Goodbye!')">Bye</div>
    </div>

    <div class="input-row">
      <button class="btn-mic" id="micBtn" onclick="startVoice()" title="Click to speak">🎤</button>
      <input class="chat-input" id="userInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()" />
      <button class="btn-send" onclick="sendMessage()" title="Send">&#9658;</button>
    </div>
  </div>

  <div class="footer">
    Built by <strong>Ayushi Jain</strong> &nbsp;|&nbsp;
    <a href="https://ude.my/UC-982acfdc-6ee2-4666-a856-64f1ddcb2b03" target="_blank">Dialogflow Certificate</a>
  </div>

  <script>
    const responses = {
      hello:      ["Hi there! How can I help you today?", "Hey! Nice to meet you. What can I do for you?"],
      services:   ["We provide AI-powered chatbot and voicebot solutions, including Dialogflow integration and cloud deployment on GCP."],
      price:      ["Please contact our support team for pricing. We have plans for all business sizes!"],
      dialogflow: ["Dialogflow is Google's NLP platform for building conversational AI. This chatbot is architected to integrate with Dialogflow for smarter, context-aware responses!"],
      bye:        ["Goodbye! Have a great day!", "See you soon! Take care!"],
      help:       ["I can answer questions about services, pricing, and our chatbot technology. Just ask!"],
      thanks:     ["You're welcome! Anything else I can help with?"],
      default:    ["I'm still learning! Could you try rephrasing that?", "Hmm, I didn't quite catch that. Try asking about our services or pricing!"]
    };

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function getResponse(input) {
      const t = input.toLowerCase();
      if (t.match(/hi|hello|hey/))           return pick(responses.hello);
      if (t.match(/service|offer|what do/))  return pick(responses.services);
      if (t.match(/price|cost|pricing/))     return pick(responses.price);
      if (t.match(/dialogflow|nlp|google/))  return pick(responses.dialogflow);
      if (t.match(/bye|goodbye|see you/))    return pick(responses.bye);
      if (t.match(/help/))                   return pick(responses.help);
      if (t.match(/thank/))                  return pick(responses.thanks);
      return pick(responses.default);
    }

    function addMsg(text, sender, extra) {
      const area = document.getElementById("chatArea");
      const d = document.createElement("div");
      d.className = "msg " + sender + (extra ? " " + extra : "");
      d.textContent = text;
      area.appendChild(d);
      area.scrollTop = area.scrollHeight;
      return d;
    }

    function setStatus(msg, timeout) {
      const s = document.getElementById("statusBar");
      s.textContent = msg;
      if (timeout) setTimeout(function() { if (s.textContent === msg) s.textContent = ""; }, timeout);
    }

    function sendMessage(text) {
      const inp = document.getElementById("userInput");
      const msg = text || inp.value.trim();
      if (!msg) return;
      inp.value = "";
      addMsg(msg, "user");
      const typingEl = addMsg("typing...", "bot", "typing");
      setTimeout(function() {
        typingEl.remove();
        const reply = getResponse(msg);
        addMsg(reply, "bot");
        speak(reply);
      }, 600);
    }

    function quickSend(text) { sendMessage(text); }

    function speak(text) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "en-US"; u.rate = 1; u.pitch = 1;
      window.speechSynthesis.speak(u);
    }

    function startVoice() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { setStatus("Speech recognition not supported in this browser.", 3000); return; }
      const r = new SR();
      r.lang = "en-US"; r.interimResults = false;
      const btn = document.getElementById("micBtn");
      btn.classList.add("listening");
      setStatus("Listening...");
      r.start();
      r.onresult = function(e) {
        const t = e.results[0][0].transcript;
        document.getElementById("userInput").value = t;
        setStatus('Heard: "' + t + '"', 2500);
        sendMessage(t);
      };
      r.onerror = function(e) { setStatus("Mic error: " + e.error, 3000); };
      r.onend = function() { btn.classList.remove("listening"); };
    }

    window.onload = function() {
      addMsg("Hi! I'm your AI voice assistant. Type, tap a suggestion, or click the mic to speak.", "bot");
    };
  </script>

</body>
</html>
